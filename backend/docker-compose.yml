services:
  mysql:
    image: mysql:8.4
    container_name: portal-aluno-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: dockersql
      MYSQL_DATABASE: portal_aluno
    ports:
      - "3332:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  mysql_data: